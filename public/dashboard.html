<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DOOMSDAY — Dashboard</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .dash-page { max-width: 900px; margin: 0 auto; padding: 24px 16px; }
    .dash-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid #1a1a1a;
    }
    .dash-team { font-family: 'Orbitron', sans-serif; font-size: 16px; color: #00ff41; }
    .dash-nav { display: flex; gap: 12px; align-items: center; }
    .dash-nav a {
      font-family: 'Orbitron', sans-serif; font-size: 10px; color: #666;
      text-transform: uppercase; letter-spacing: 1px;
    }
    .dash-nav a:hover { color: #00ff41; }

    .category-section { margin-bottom: 28px; }
    .category-header {
      font-family: 'Orbitron', sans-serif; font-size: 14px; color: #00ff41;
      letter-spacing: 2px; margin-bottom: 10px;
      display: flex; align-items: center; gap: 10px;
    }
    .category-count {
      font-size: 10px; color: #555; font-family: 'Orbitron', sans-serif;
    }
    .q-row {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 14px; background: #0a0a0a; border: 1px solid #1a1a1a;
      margin-bottom: 4px; transition: border-color 0.2s;
    }
    .q-row:hover { border-color: #333; }
    .q-status {
      width: 8px; height: 8px; border-radius: 50%;
      background: #333; flex-shrink: 0;
    }
    .q-status.submitted { background: #00ff41; box-shadow: 0 0 6px rgba(0,255,65,0.5); }
    .q-title { flex: 1; font-size: 13px; }
    .q-meta { font-size: 10px; color: #555; text-align: right; }
    .q-sub-count { color: #00cc33; font-family: 'Orbitron', sans-serif; font-size: 10px; }


    .summary-bar {
      display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap;
    }
    .summary-card {
      background: #0a0a0a; border: 1px solid #1a1a1a; padding: 14px 20px;
      text-align: center; flex: 1; min-width: 120px;
    }
    .summary-value {
      font-family: 'Orbitron', sans-serif; font-size: 20px; color: #00ff41;
    }
    .summary-label {
      font-family: 'Orbitron', sans-serif; font-size: 9px; color: #555;
      text-transform: uppercase; letter-spacing: 1px; margin-top: 4px;
    }

    .announcements-section { margin-top: 24px; }
    .ann-item {
      padding: 10px 14px; background: #0a0a0a; border: 1px solid #1a1a1a;
      margin-bottom: 4px; font-size: 13px; color: #ccc;
    }
    .ann-time { font-size: 10px; color: #444; margin-top: 4px; }
  </style>
</head>
<body>
  <div class="dash-page">
    <div class="dash-header">
      <div>
        <div class="dash-team" id="team-name">—</div>
        <div style="font-size:10px;color:#555;margin-top:4px;" id="team-id"></div>
      </div>
      <div class="dash-nav">
        <a href="/gameboard.html">Gameboard</a>
        <button class="btn btn-small btn-danger" onclick="logout()" style="padding:4px 10px;font-size:9px;">Logout</button>
      </div>
    </div>

    <div class="summary-bar" id="summary-bar"></div>

    <div id="category-sections"></div>

    <div class="announcements-section">
      <h3 style="font-family:Orbitron;font-size:12px;color:#666;letter-spacing:2px;margin-bottom:10px;">ANNOUNCEMENTS</h3>
      <div id="announcements-list"></div>
    </div>
  </div>

  <script>
    async function init() {
      const res = await fetch('/auth/me');
      const data = await res.json();
      if (!data.loggedIn) { window.location.href = '/'; return; }
      if (data.user.role === 'admin') { window.location.href = '/admin.html'; return; }
      if (!data.hasTeam) { window.location.href = '/'; return; }

      document.getElementById('team-name').textContent = data.team.team_name;
      document.getElementById('team-id').textContent = 'Team #' + data.team.id;

      loadDashboard();
      loadAnnouncements();
    }

    async function loadDashboard() {
      try {
        const res = await fetch('/api/dashboard');
        const data = await res.json();

        // Summary
        let totalQuestions = 0, totalSubmitted = 0, totalSubmissions = 0;
        for (const [cat, questions] of Object.entries(data.categoryProgress)) {
          questions.forEach(q => {
            totalQuestions++;
            if (q.submitted) totalSubmitted++;
            totalSubmissions += q.submissionCount;
          });
        }

        document.getElementById('summary-bar').innerHTML = `
          <div class="summary-card">
            <div class="summary-value">${totalSubmitted}/${totalQuestions}</div>
            <div class="summary-label">Submitted</div>
          </div>
          <div class="summary-card">
            <div class="summary-value">${totalSubmissions}</div>
            <div class="summary-label">Total Submissions</div>
          </div>
        `;

        // Categories
        const container = document.getElementById('category-sections');
        container.innerHTML = '';
        for (const cat of ['AI', 'CP', 'HEX', 'DEV']) {
          const questions = data.categoryProgress[cat] || [];
          if (questions.length === 0) continue;

          const submitted = questions.filter(q => q.submitted).length;
          let html = `
            <div class="category-section">
              <div class="category-header">
                ${cat}
                <span class="category-count">${submitted}/${questions.length} submitted</span>
              </div>
          `;

          questions.forEach(q => {
            const lastTime = q.lastSubmittedAt ? new Date(q.lastSubmittedAt).toLocaleString() : '';
            html += `
              <div class="q-row">
                <div class="q-status ${q.submitted ? 'submitted' : ''}"></div>
                <div class="q-title">${escapeHtml(q.title)}</div>
                <div class="q-meta">
                  ${q.submitted ? `<span class="q-sub-count">${q.submissionCount} sub${q.submissionCount !== 1 ? 's' : ''}</span>` : '<span style="color:#333;">—</span>'}
                  ${lastTime ? `<div style="font-size:9px;color:#444;margin-top:2px;">${lastTime}</div>` : ''}
                </div>
              </div>
            `;
          });

          html += '</div>';
          container.innerHTML += html;
        }
      } catch (e) { console.error('Dashboard error:', e); }
    }

    async function loadAnnouncements() {
      try {
        const res = await fetch('/api/announcements');
        const anns = await res.json();
        const container = document.getElementById('announcements-list');
        if (anns.length === 0) {
          container.innerHTML = '<div style="color:#333;font-size:12px;">No announcements yet.</div>';
          return;
        }
        container.innerHTML = anns.map(a => `
          <div class="ann-item">
            ${escapeHtml(a.message)}
            <div class="ann-time">${new Date(a.created_at).toLocaleString()}</div>
          </div>
        `).join('');
      } catch (e) { console.error('Announcements error:', e); }
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str || '';
      return div.innerHTML;
    }

    async function logout() {
      await fetch('/auth/logout', { method: 'POST' });
      window.location.href = '/';
    }

    init();
  </script>
</body>
</html>
