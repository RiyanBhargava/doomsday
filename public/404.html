<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Universe Destroyed</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .error-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
    }
    .error-code {
      font-family: 'Orbitron', sans-serif;
      font-size: 120px;
      font-weight: 900;
      color: #00ff41;
      text-shadow: 0 0 30px rgba(0,255,65,0.5), 0 0 60px rgba(0,255,65,0.2);
      animation: glitch 3s infinite;
      line-height: 1;
      margin-bottom: 16px;
    }
    .error-msg {
      font-family: 'Courier New', monospace;
      font-size: 16px;
      color: #444;
      margin-bottom: 30px;
    }
    .error-sub {
      font-size: 12px;
      color: #222;
      margin-bottom: 30px;
    }
  </style>
</head>
<body>
  <div class="error-page">
    <div class="error-code">404</div>
    <p class="error-msg">This universe has already been destroyed.</p>
    <p class="error-sub">There's nothing left here. Doom was already here.</p>
    <a href="/" class="btn btn-pulse">Return to Base</a>
  </div>
</body>
</html>
